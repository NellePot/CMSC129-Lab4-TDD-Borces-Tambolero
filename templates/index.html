<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ToDo List</title>
</head>
<body>
  <button class="add-task">+ Add Task</button>

  <div class="categories" data-testid="task-list">
    <div class="status pending"><div class="list-container" id="pendingTasks"></div></div>
    <div class="status ongoing"><div class="list-container" id="ongoingTasks"></div></div>
    <div class="status done"><div class="list-container" id="doneTasks"></div></div>
  </div>

  <div id="addTaskForm" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); justify-content:center; align-items:center;">
    <div>
      <span id="closePopUp">×</span>
      <input type="text" id="taskName" data-testid="task-title-input" placeholder="Task Name" />
      <button id="saveTask" data-testid="add-task-button">Add Task</button>
    </div>
  </div>

  <div id="deleteModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); justify-content:center; align-items:center;">
    <div>
      <button id="cancelDeleteBtn">Cancel</button>
      <button id="confirmDeleteBtn" data-testid="delete-task-button">Yes, Delete</button>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
